services:
  - type: web
    name: nestway-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: USE_MOCK_DATA
        value: false
      - key: MONGO_URI
        sync: false        # Set this manually in Render dashboard
      - key: ADMIN_SECRET
        sync: false        # Set this manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false        # Set this manually in Render dashboard
      - key: OPENWEATHER_API_KEY
        sync: false
