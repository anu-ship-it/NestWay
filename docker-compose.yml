# ─────────────────────────────────────────────────────────────
#  NestWay — docker-compose.yml
#
#  Starts backend + frontend together with one command:
#    docker-compose up --build
#
#  Frontend → http://localhost:3000
#  Backend  → http://localhost:5000
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Backend (Express API) ──────────────────────────────────
  backend:
    build:
      context: ./nestway-backend
      dockerfile: Dockerfile
    container_name: nestway-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - USE_MOCK_DATA=true          # Set to false once MongoDB is connected
      - MONGO_URI=${MONGO_URI}      # Pulled from .env file
      - ADMIN_SECRET=${ADMIN_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    env_file:
      - ./nestway-backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React + nginx) ───────────────────────────────
  frontend:
    build:
      context: ./nestway-frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:5000   # Backend URL seen by browser
    container_name: nestway-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

# ── Networks ───────────────────────────────────────────────
networks:
  default:
    name: nestway-network
